<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: rounded square with brand gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="20" y="20" width="472" height="472" rx="96" fill="none"
        stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!--
    Abstract evidence motif:
    Three ascending bars (data/evidence) cradled by an open arc (open knowledge).
    No cross, no medical symbol — pure geometric "rising verified evidence".
  -->

  <!-- Open arc beneath bars (the "open" in openEBM) -->
  <path d="M 96 360 Q 256 460 416 360"
        stroke="#ffffff" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- Three rising bars -->
  <rect x="148" y="232" width="56" height="112" rx="16" fill="url(#bar)" opacity="0.75"/>
  <rect x="228" y="172" width="56" height="172" rx="16" fill="url(#bar)" opacity="0.88"/>
  <rect x="308" y="120" width="56" height="224" rx="16" fill="url(#bar)"/>

  <!-- Verification dot above the tallest bar -->
  <circle cx="336" cy="92" r="18" fill="#ffffff"/>
  <circle cx="336" cy="92" r="9"  fill="#22d3ee"/>
</svg>
